name: Codebase Incremental Indexer

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Run daily at 00:00 UTC (keeps embeddings fresh based on master updates)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI


jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          cd _indexer
          npm install

      - name: Run Chunker & Indexer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          cd _indexer
          npm run index
